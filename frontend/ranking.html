<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Ranking — AnimeProxy</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
:root {
    --netflix-red: #E50914;
    --bg-black: #141414;
    --card-bg: #181818;
    --text-white: #FFFFFF;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { 
    background-color: var(--bg-black); color: var(--text-white); 
    font-family: 'Inter', sans-serif;
}

header {
    height: 70px; display: flex; align-items: center; justify-content: space-between;
    padding: 0 4%; background: rgba(0,0,0,0.8); position: sticky; top: 0; z-index: 100;
}
.logo { font-size: 1.5rem; font-weight: 900; color: var(--netflix-red); text-decoration: none; }

.container { padding: 40px 4%; max-width: 1200px; margin: 0 auto; }
h1 { font-size: 2.5rem; font-weight: 900; margin-bottom: 40px; text-align: center; }

.ranking-list { display: flex; flex-direction: column; gap: 15px; }
.ranking-item {
    display: flex; align-items: center; gap: 20px; background: var(--card-bg);
    padding: 15px; border-radius: 8px; text-decoration: none; color: white;
    transition: 0.2s; border: 1px solid transparent;
}
.ranking-item:hover { transform: translateX(10px); background: #222; border-color: var(--netflix-red); }

.rank-number { font-size: 2.5rem; font-weight: 900; color: rgba(255,255,255,0.1); width: 60px; text-align: center; }
.ranking-item:nth-child(1) .rank-number { color: gold; text-shadow: 0 0 10px rgba(255,215,0,0.5); }
.ranking-item:nth-child(2) .rank-number { color: silver; }
.ranking-item:nth-child(3) .rank-number { color: #cd7f32; }

.poster { width: 60px; height: 90px; border-radius: 4px; object-fit: cover; }
.info { flex: 1; }
.info .title { font-size: 1.2rem; font-weight: 700; margin-bottom: 5px; }
.info .meta { font-size: 0.85rem; color: #888; }
.views { font-weight: 700; color: var(--netflix-red); font-size: 1.1rem; }

</style>
</head>
<body>

<header>
    <a href="/" class="logo">ANIFLIX</a>
    <nav>
        <a href="/" style="color: white; text-decoration: none; font-weight: 600;">Início</a>
    </nav>
</header>

<div class="container">
    <h1>Top 50 Animes Popularidade</h1>
    <div class="ranking-list">
        {% for a in ranking %}
        <a href="/anime/{{ a.id }}" class="ranking-item">
            <div class="rank-number">{{ loop.index }}</div>
            <img class="poster" src="{{ a.url_capa }}" alt="Poster">
            <div class="info">
                <div class="title">{{ a.titulo }}</div>
                <div class="meta">{{ a.genero or 'Aventura' }} • {{ a.ano or '2024' }}</div>
            </div>
            <div class="views">{{ a.visualizacoes_total or 0 }} views</div>
        </a>
        {% endfor %}
    </div>
</div>

</body>
</html>
